services:
  leesmap:
    build: .
    # Komodo deploys with `docker compose up -d` (no --build), which otherwise
    # reuses the cached image and never picks up src/ changes. pull_policy: build
    # tells compose to (re)build the image from source on every deploy.
    pull_policy: build
    container_name: leesmap
    restart: unless-stopped
    ports:
      # Host port is configurable (default 8088) so it won't clash with other
      # services; the app always listens on 8080 inside the container.
      - "${LEESMAP_PORT:-8088}:8080"
    environment:
      # Your personal De Correspondent RSS feed (all publications).
      DC_RSS_URL: ${DC_RSS_URL}
      # Login (preferred): the app logs in and refreshes its own session.
      DC_EMAIL: ${DC_EMAIL:-}
      DC_PASSWORD: ${DC_PASSWORD:-}
      # Manual cookie (fallback): overrides the login above if set. Leave blank
      # to use DC_EMAIL/DC_PASSWORD.
      DC_COOKIE: ${DC_COOKIE:-}
      # Reader address. On its own hotspot: 192.168.4.1. On your WiFi: its LAN IP.
      X4_IP: ${X4_IP:-192.168.4.1}
      # Optional HTTP basic auth for the UI (recommended if not behind Tailscale).
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
      # Optional narrower gate: guards instellingen + send/publish only, so the
      # app can be shared without letting someone reconfigure or send by accident.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Optional Send-to-PocketBook: mails the nightly digest (and manual sends)
      # to a PocketBook device's own username@pbsync.com address. Leave
      # POCKETBOOK_EMAIL unset to skip this channel entirely.
      POCKETBOOK_EMAIL: ${POCKETBOOK_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      # A Docker-managed named volume (not a host bind mount). Docker initialises
      # it from the image, where /data is owned by the container's `node` user,
      # so settings/correspondents/session actually persist. A bind mount to a
      # host folder gets created root-owned and the non-root app can't write it.
      - leesmap-data:/data
    # To auto-send, the container must reach the reader's IP. On your home WiFi
    # a normal bridge network reaches LAN hosts fine. If that ever fails, try:
    # network_mode: host
volumes:
  leesmap-data:
networks:
  default:
    external: true
    name: ubuntu_network