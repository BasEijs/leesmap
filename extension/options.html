<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Leesmap — instellingen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="options">
  <header class="opt-head">
    <p class="eyebrow">Leesmap · Brabants Dagblad</p>
    <h1>Instellingen</h1>
    <p class="lede">
      Adres van je zelf-gehoste leesmap-server, plus de optionele wachtwoorden
      als je die daar hebt ingesteld (zie de leesmap-README onder "Security").
    </p>
  </header>

  <label class="field">Server-URL
    <input id="serverUrl" type="text" placeholder="http://192.168.1.50:8088" />
    <small>Bijv. http://192.168.1.50:8088 — hetzelfde adres als de leesmap-webinterface.</small>
  </label>

  <label class="field">Admin-wachtwoord
    <input id="adminPassword" type="password" />
    <small>Alleen nodig als ADMIN_PASSWORD is ingesteld op de server.</small>
  </label>

  <label class="field">Basic-auth gebruikersnaam
    <input id="basicUser" type="text" />
    <small>Alleen nodig als BASIC_AUTH_USER is ingesteld.</small>
  </label>

  <label class="field">Basic-auth wachtwoord
    <input id="basicPass" type="password" />
  </label>

  <div class="opt-actions">
    <button id="save" class="primary">Opslaan</button>
    <span id="saved" class="saved-msg"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
