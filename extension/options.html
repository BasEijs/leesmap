<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Leesmap — instellingen</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 420px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 14px; font-size: 13px; font-weight: 600; }
    input { width: 100%; padding: 7px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
    button {
      margin-top: 18px; padding: 8px 18px; cursor: pointer; border-radius: 6px;
      border: 1px solid #333; background: #141414; color: #fff;
    }
    #saved { margin-left: 10px; color: #1a7f37; font-size: 13px; }
    p.hint { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h2>Leesmap — instellingen</h2>
  <p class="hint">
    Adres van je zelf-gehoste leesmap-server, plus de optionele wachtwoorden
    als je die daar hebt ingesteld (zie de leesmap-README onder "Security").
  </p>

  <label for="serverUrl">Server-URL (bijv. http://192.168.1.50:8088)</label>
  <input id="serverUrl" type="text" placeholder="http://192.168.1.50:8088" />

  <label for="adminPassword">Admin-wachtwoord (alleen als ADMIN_PASSWORD is ingesteld)</label>
  <input id="adminPassword" type="password" />

  <label for="basicUser">Basic-auth gebruikersnaam (alleen als BASIC_AUTH_USER is ingesteld)</label>
  <input id="basicUser" type="text" />

  <label for="basicPass">Basic-auth wachtwoord</label>
  <input id="basicPass" type="password" />

  <button id="save">Opslaan</button>
  <span id="saved"></span>

  <script src="options.js"></script>
</body>
</html>
