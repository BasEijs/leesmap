<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Leesmap</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; width: 260px; padding: 12px; margin: 0; }
    button {
      width: 100%; padding: 9px; font-size: 14px; cursor: pointer;
      border: 1px solid #333; background: #141414; color: #fff; border-radius: 6px;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 10px; font-size: 13px; min-height: 2.4em; }
    #status.ok { color: #1a7f37; }
    #status.err { color: #b3261e; }
    p.opts { margin: 10px 0 0; }
    a { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <button id="send">Verstuur artikel naar Leesmap</button>
  <div id="status"></div>
  <p class="opts"><a href="#" id="opts">Instellingen</a></p>
  <script src="popup.js"></script>
</body>
</html>
